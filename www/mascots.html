<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litten 마스코트 · 헤드폰 크기 시안</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3.5' y='3' width='13' height='18' rx='2.6' fill='%234A90E2'/><path d='M18.5 1 L19.7 4.8 L23.5 6 L19.7 7.2 L18.5 11 L17.3 7.2 L13.5 6 L17.3 4.8 Z' fill='%23FBBF24'/></svg>">
    <style>
        :root {
            --grad: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            --primary: #4A90E2;
            --ink: #1e293b;
            --muted: #5b6b7f;
            --bg-soft: #f3f8fe;
            --bg-tint: #e8f1fb;
            --line: #dbe6f3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            color: var(--ink); background: var(--bg-soft); line-height: 1.6;
        }
        nav {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .logo { font-size: 1.5rem; font-weight: 800; text-decoration: none;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        nav a.back { text-decoration: none; color: var(--primary); font-weight: 600; }
        header { text-align: center; padding: 3.5rem 2rem 1rem; }
        header h1 { font-size: 2.3rem; font-weight: 800; }
        header p { color: var(--muted); font-size: 1.12rem; margin-top: 0.6rem; }
        .grid {
            max-width: 1180px; margin: 2.5rem auto; padding: 0 2rem 4rem;
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem;
        }
        .card {
            background: #fff; border: 1px solid var(--line); border-radius: 20px;
            padding: 1.6rem 1.1rem; text-align: center;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .card:hover { transform: translateY(-7px); box-shadow: 0 20px 40px rgba(74,144,226,0.16); }
        .card.pick { border-color: var(--primary); box-shadow: 0 14px 36px rgba(74,144,226,0.2); }
        .stage {
            background: var(--bg-tint); border-radius: 16px; padding: 1rem; margin-bottom: 1rem;
            display: flex; align-items: center; justify-content: center;
        }
        .stage svg { width: 100%; max-width: 150px; height: auto; animation: floaty 3.4s ease-in-out infinite; }
        .card:nth-child(2) .stage svg { animation-delay: .25s; }
        .card:nth-child(3) .stage svg { animation-delay: .5s; }
        .card:nth-child(4) .stage svg { animation-delay: .75s; }
        .card:nth-child(5) .stage svg { animation-delay: 1s; }
        @keyframes floaty { 0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(-11px) rotate(1deg);} }
        .badge { display:inline-block; background: rgba(74,144,226,0.1); color: var(--primary);
            font-weight:700; font-size:0.8rem; padding:0.28rem 0.8rem; border-radius:50px; margin-bottom:0.6rem; }
        .card h3 { font-size: 1.2rem; margin-bottom: 0.2rem; }
        .card .sz { color: var(--muted); font-size: 0.86rem; }
        footer { text-align:center; padding: 1rem 2rem 3rem; color: var(--muted); font-size: 0.95rem; }
        @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, 1fr); max-width: 460px; } }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; max-width: 280px; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Litten</a>
        <a href="index.html" class="back">← 홈으로</a>
    </nav>

    <header>
        <h1>노트군 · 헤드폰 크기 시안</h1>
        <p>헤드폰 크기만 5단계로 다르게 했어요. 마음에 드는 번호를 골라주세요</p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>번호(①~⑤)를 알려주시면 홈페이지 히어로와 아이콘에 그 크기로 적용할게요.</footer>

    <script>
        // 헤드폰을 제외한 노트군 베이스 + 헤드폰(scale 변형) 조립
        const SIZES = [
            { n: '①', label: '미니',   sz: 'XS · scale 0.65', s: 0.65 },
            { n: '②', label: '작게',   sz: 'S · scale 0.82',  s: 0.82 },
            { n: '③', label: '기본',   sz: 'M · scale 1.0 (현재)', s: 1.0, pick: true },
            { n: '④', label: '크게',   sz: 'L · scale 1.2',   s: 1.2 },
            { n: '⑤', label: '특대',   sz: 'XL · scale 1.45', s: 1.45 },
        ];

        function mascot(id, s) {
            return `
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="노트군">
                <defs><linearGradient id="body${id}" x1="46" y1="52" x2="154" y2="172" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#4A90E2"/><stop offset="1" stop-color="#357ABD"/></linearGradient></defs>
                <ellipse cx="100" cy="184" rx="46" ry="7" fill="#1e3a5f" opacity="0.18"/>
                <rect x="46" y="52" width="108" height="122" rx="22" fill="url(#body${id})"/>
                <path d="M133 52 L154 73 L133 73 Z" fill="#6BB6FF"/>
                <circle cx="81" cy="101" r="11.5" fill="#fff"/><circle cx="119" cy="101" r="11.5" fill="#fff"/>
                <circle cx="83" cy="103" r="5.6" fill="#1e293b"/><circle cx="121" cy="103" r="5.6" fill="#1e293b"/>
                <circle cx="85" cy="101" r="1.9" fill="#fff"/><circle cx="123" cy="101" r="1.9" fill="#fff"/>
                <ellipse cx="72" cy="118" rx="6" ry="3.6" fill="#ff8fa3" opacity="0.55"/>
                <ellipse cx="128" cy="118" rx="6" ry="3.6" fill="#ff8fa3" opacity="0.55"/>
                <path d="M90 119 Q100 130 110 119" fill="none" stroke="#1e293b" stroke-width="3.2" stroke-linecap="round"/>
                <rect x="64" y="143" width="72" height="6" rx="3" fill="#fff" opacity="0.92"/>
                <rect x="64" y="155" width="50" height="6" rx="3" fill="#fff" opacity="0.72"/>
                <!-- 헤드폰 (중심 100,105 기준 scale) -->
                <g transform="translate(100,105) scale(${s}) translate(-100,-105)">
                    <path d="M50 74 A52 52 0 0 1 150 74" fill="none" stroke="#2c3e50" stroke-width="9" stroke-linecap="round"/>
                    <rect x="37" y="92" width="17" height="36" rx="8.5" fill="#2c3e50"/>
                    <rect x="146" y="92" width="17" height="36" rx="8.5" fill="#2c3e50"/>
                </g>
                <!-- AI 스파클 -->
                <path d="M151 26 L155.5 39 L168 43.5 L155.5 48 L151 61 L146.5 48 L134 43.5 L146.5 39 Z" fill="#FBBF24"/>
                <path d="M171 58 L173 65.5 L180 67.5 L173 69.5 L171 77 L169 69.5 L162 67.5 L169 65.5 Z" fill="#FBBF24" opacity="0.85"/>
            </svg>`;
        }

        document.getElementById('grid').innerHTML = SIZES.map((v, i) => `
            <div class="card${v.pick ? ' pick' : ''}">
                <div class="stage">${mascot(i, v.s)}</div>
                <span class="badge">헤드폰 ${v.n}</span>
                <h3>${v.label}</h3>
                <div class="sz">${v.sz}</div>
            </div>`).join('');
    </script>
</body>
</html>
