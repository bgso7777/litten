<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litten · 기능 아이콘 시안</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3.5' y='3' width='13' height='18' rx='2.6' fill='%234A90E2'/><path d='M18.5 1 L19.7 4.8 L23.5 6 L19.7 7.2 L18.5 11 L17.3 7.2 L13.5 6 L17.3 4.8 Z' fill='%23FBBF24'/></svg>">
    <style>
        :root { --grad: linear-gradient(135deg,#4A90E2,#357ABD); --primary:#4A90E2; --ink:#1e293b; --muted:#5b6b7f; --bg-soft:#f3f8fe; --line:#dbe6f3; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif; color:var(--ink); background:var(--bg-soft); line-height:1.6; }
        nav { background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); box-shadow:0 2px 12px rgba(0,0,0,0.06); padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
        .logo { font-size:1.5rem; font-weight:800; text-decoration:none; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        nav a.back { text-decoration:none; color:var(--primary); font-weight:600; }
        header { text-align:center; padding:3.5rem 2rem 1rem; }
        header h1 { font-size:2.3rem; font-weight:800; }
        header p { color:var(--muted); font-size:1.12rem; margin-top:0.6rem; }
        .grid { max-width:820px; margin:2.5rem auto; padding:0 2rem 4rem; display:grid; grid-template-columns:1fr; gap:1.3rem; }
        .card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:1.5rem 1.4rem; }
        .card h3 { font-size:1.15rem; margin-bottom:1rem; text-align:center; }
        .icons { display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; }
        .ic { text-align:center; }
        .tile-wrap svg { width:62px; height:62px; display:block; filter:drop-shadow(0 5px 10px rgba(74,144,226,0.16)); }
        .ic span { display:block; margin-top:0.45rem; font-size:0.76rem; color:var(--muted); }
        footer { text-align:center; padding:1rem 2rem 3rem; color:var(--muted); font-size:0.95rem; }
        @media (max-width:520px){ .tile-wrap svg{ width:52px; height:52px; } .icons{ gap:0.7rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Litten</a>
        <a href="index.html" class="back">← 홈으로</a>
    </nav>
    <header>
        <h1>기능 아이콘 시안</h1>
        <p>노트군 톤(블루 + 골드 별)을 살린 기능 아이콘이에요. 기능마다 3가지 스타일 중 골라주세요</p>
    </header>
    <div class="grid" id="grid"></div>
    <footer>기능별로 원하는 스타일(화이트 / 블루 / 그라데)을 알려주시면 앱에 적용해 드릴게요.</footer>

    <script>
        const FEATURES = [
            { t:'memo',    name:'메모' },
            { t:'draw',    name:'필기' },
            { t:'record',  name:'녹음' },
            { t:'recmemo', name:'녹음 메모' },
            { t:'photo',   name:'사진' },
            { t:'video',   name:'비디오' },
            { t:'channel', name:'영상채널' },
            { t:'file',    name:'파일' },
            { t:'sync',     name:'동기화' },
            { t:'share',    name:'공유' },
            { t:'quiz',     name:'퀴즈' },
            { t:'calendar', name:'캘린더' },
            { t:'remind',   name:'리마인드' },
        ];
        const STYLES = [
            { label:'화이트', tile:'plain', body:'#4A90E2', cut:'#ffffff' },
            { label:'소프트', tile:'soft',  body:'#3f86d8', cut:'#ffffff' },
            { label:'블루',   tile:'solid', body:'#ffffff', cut:'#4A90E2' },
            { label:'그라데', tile:'grad',  body:'#ffffff', cut:'#2f6db5' },
            { label:'다크',   tile:'dark',  body:'#6BB6FF', cut:'#1f2b40' },
        ];

        function sym(type, body, cut) {
            const star = `<path d="M19.3 1 L20.2 3.1 L22.3 4 L20.2 4.9 L19.3 7 L18.4 4.9 L16.3 4 L18.4 3.1 Z" fill="#FBBF24"/>
                <path d="M22.2 6.1 L22.55 7.15 L23.6 7.5 L22.55 7.85 L22.2 8.9 L21.85 7.85 L20.8 7.5 L21.85 7.15 Z" fill="#FBBF24" opacity="0.9"/>
                <path d="M22.3 0.8 L22.65 1.85 L23.7 2.2 L22.65 2.55 L22.3 3.6 L21.95 2.55 L20.9 2.2 L21.95 1.85 Z" fill="#FBBF24" opacity="0.8"/>`;
            const S = {
                memo: `<rect x="5" y="3.5" width="11" height="15" rx="2.2" fill="${body}"/>
                    <rect x="7.2" y="7" width="6.6" height="1.4" rx="0.7" fill="${cut}"/>
                    <rect x="7.2" y="9.9" width="6.6" height="1.4" rx="0.7" fill="${cut}"/>
                    <rect x="7.2" y="12.8" width="4" height="1.4" rx="0.7" fill="${cut}"/>`,
                draw: `<g transform="rotate(45 11 12)">
                    <rect x="9.2" y="3" width="3.6" height="13" rx="1" fill="${body}"/>
                    <rect x="9.2" y="3" width="3.6" height="2.3" rx="1" fill="${cut}"/>
                    <path d="M9.2 15.8 L11 19.4 L12.8 15.8 Z" fill="${body}"/>
                    <path d="M10.5 17.6 L11 18.7 L11.5 17.6 Z" fill="${cut}"/></g>`,
                record: `<rect x="8.8" y="2.6" width="6.4" height="11.4" rx="3.2" fill="${body}"/>
                    <path d="M6 10.4 a6 6 0 0 0 12 0" fill="none" stroke="${body}" stroke-width="1.7"/>
                    <rect x="11.1" y="16.4" width="1.8" height="3.4" fill="${body}"/>
                    <rect x="8.3" y="19.3" width="7.4" height="1.7" rx="0.85" fill="${body}"/>
                    <rect x="10.2" y="5" width="3.6" height="1" rx="0.5" fill="${cut}"/>
                    <rect x="10.2" y="7" width="3.6" height="1" rx="0.5" fill="${cut}"/>`,
                recmemo: `<rect x="4.4" y="3" width="5" height="9" rx="2.5" fill="${body}"/>
                    <path d="M2.5 8.8 a4.4 4.4 0 0 0 8.8 0" fill="none" stroke="${body}" stroke-width="1.5"/>
                    <rect x="6.5" y="13.8" width="1.4" height="2.6" fill="${body}"/>
                    <rect x="4.3" y="16" width="5.6" height="1.6" rx="0.8" fill="${body}"/>
                    <rect x="12.6" y="5.6" width="7" height="1.5" rx="0.75" fill="${body}"/>
                    <rect x="12.6" y="9" width="7" height="1.5" rx="0.75" fill="${body}"/>
                    <rect x="12.6" y="12.4" width="4.4" height="1.5" rx="0.75" fill="${body}"/>`,
                photo: `<rect x="2.5" y="6" width="19" height="13" rx="2.8" fill="${body}"/>
                    <path d="M8.3 6 L9.6 3.8 L14.4 3.8 L15.7 6 Z" fill="${body}"/>
                    <circle cx="12" cy="12.5" r="3.7" fill="${cut}"/>
                    <circle cx="12" cy="12.5" r="1.7" fill="${body}"/>`,
                video: `<rect x="2.5" y="6.5" width="12.5" height="11" rx="2.4" fill="${body}"/>
                    <path d="M16 10.4 L21 7.4 L21 16.6 L16 13.6 Z" fill="${body}"/>
                    <path d="M6.2 10 L11 12 L6.2 14 Z" fill="${cut}"/>`,
                channel: `<rect x="2.5" y="4.5" width="19" height="13.5" rx="3.2" fill="${body}"/>
                    <path d="M10 8.5 L15 11.2 L10 13.9 Z" fill="${cut}"/>
                    <rect x="8.5" y="19.7" width="7" height="1.7" rx="0.85" fill="${body}"/>`,
                file: `<path d="M6 2.5 h7 l5 5 v12.4 a1.6 1.6 0 0 1 -1.6 1.6 h-9.8 a1.6 1.6 0 0 1 -1.6 -1.6 v-15.8 a1.6 1.6 0 0 1 1.6 -1.6 Z" fill="${body}"/>
                    <path d="M13 2.5 v5 h5 Z" fill="${cut}"/>
                    <rect x="8" y="12.5" width="8" height="1.4" rx="0.7" fill="${cut}"/>
                    <rect x="8" y="15.5" width="8" height="1.4" rx="0.7" fill="${cut}"/>`,
                sync: `<path d="M5.5 11 a6.5 6.5 0 0 1 11 -4.3" fill="none" stroke="${body}" stroke-width="2.1" stroke-linecap="round"/>
                    <path d="M17.3 3.3 L17 8 L12.7 6.5 Z" fill="${body}"/>
                    <path d="M18.5 13 a6.5 6.5 0 0 1 -11 4.3" fill="none" stroke="${body}" stroke-width="2.1" stroke-linecap="round"/>
                    <path d="M6.7 20.7 L7 16 L11.3 17.5 Z" fill="${body}"/>`,
                share: `<circle cx="16.5" cy="5.5" r="2.7" fill="${body}"/>
                    <circle cx="6.5" cy="12" r="2.7" fill="${body}"/>
                    <circle cx="16.5" cy="18.5" r="2.7" fill="${body}"/>
                    <path d="M8.9 10.7 L14.1 6.8" stroke="${body}" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M8.9 13.3 L14.1 17.2" stroke="${body}" stroke-width="1.8" stroke-linecap="round"/>`,
                quiz: `<circle cx="12" cy="9.3" r="6" fill="${body}"/>
                    <rect x="9.2" y="14.3" width="5.6" height="2" rx="0.6" fill="${body}"/>
                    <rect x="9.8" y="16.6" width="4.4" height="1.7" rx="0.6" fill="${body}"/>
                    <rect x="10.4" y="18.6" width="3.2" height="1.5" rx="0.7" fill="${body}"/>
                    <text x="12" y="12.6" font-family="-apple-system,Arial,sans-serif" font-size="10" font-weight="800" fill="${cut}" text-anchor="middle">q</text>`,
                calendar: `<rect x="3.5" y="4.5" width="17" height="16" rx="2.6" fill="${body}"/>
                    <rect x="6.8" y="2.6" width="1.8" height="4" rx="0.9" fill="${body}"/>
                    <rect x="15.4" y="2.6" width="1.8" height="4" rx="0.9" fill="${body}"/>
                    <rect x="3.5" y="8.3" width="17" height="1.2" fill="${cut}" opacity="0.45"/>
                    <path d="M7.8 13.8 L10.8 16.8 L16.4 10.8" fill="none" stroke="${cut}" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>`,
                remind: `<circle cx="12" cy="6.2" r="4.3" fill="${body}"/>
                    <rect x="9.9" y="9.9" width="4.2" height="1.5" rx="0.5" fill="${body}"/>
                    <rect x="10.4" y="11.6" width="3.2" height="1.3" rx="0.6" fill="${body}"/>
                    <text x="12" y="8.7" font-family="-apple-system,Arial,sans-serif" font-size="7.5" font-weight="800" fill="${cut}" text-anchor="middle">q</text>
                    <path d="M12 12.6 L13.3 15.3 L16 16.6 L13.3 17.9 L12 20.6 L10.7 17.9 L8 16.6 L10.7 15.3 Z" fill="#FBBF24"/>
                    <path d="M17 13.1 L17.4 14.2 L18.5 14.6 L17.4 15 L17 16.1 L16.6 15 L15.5 14.6 L16.6 14.2 Z" fill="#FBBF24" opacity="0.9"/>
                    <path d="M7 13.1 L7.4 14.2 L8.5 14.6 L7.4 15 L7 16.1 L6.6 15 L5.5 14.6 L6.6 14.2 Z" fill="#FBBF24" opacity="0.9"/>`,
            };
            return type === 'remind' ? S[type] : S[type] + star;
        }

        function tile(style, inner) {
            let bg;
            if (style.tile === 'plain') bg = `<rect x="0.6" y="0.6" width="22.8" height="22.8" rx="5" fill="#fff" stroke="#dbe6f3"/>`;
            else if (style.tile === 'soft') bg = `<rect width="24" height="24" rx="5.4" fill="#e3eefb"/>`;
            else if (style.tile === 'solid') bg = `<rect width="24" height="24" rx="5.4" fill="#4A90E2"/>`;
            else if (style.tile === 'grad') bg = `<rect width="24" height="24" rx="5.4" fill="url(#tg)"/>`;
            else bg = `<rect width="24" height="24" rx="5.4" fill="#1f2b40"/>`;
            return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="tg" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#62a8f5"/><stop offset="1" stop-color="#2b5a99"/></linearGradient></defs>
                ${bg}<g transform="translate(2.6 2.6) scale(0.78)">${inner}</g></svg>`;
        }

        document.getElementById('grid').innerHTML = FEATURES.map(f => `
            <div class="card">
                <h3>${f.name}</h3>
                <div class="icons">
                    ${STYLES.map(s => `<div class="ic"><div class="tile-wrap">${tile(s, sym(f.t, s.body, s.cut))}</div><span>${s.label}</span></div>`).join('')}
                </div>
            </div>`).join('');
    </script>
</body>
</html>
